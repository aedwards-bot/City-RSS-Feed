name: Update City Feed
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to clear the warning

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to clear the warning
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Feed Parser
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python city_feed_parcer.py # Fixed spelling to match your file exactly

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated AI feed update" || exit 0
          git push
