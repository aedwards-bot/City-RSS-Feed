name: Update City Feed
on:
  schedule:
    - cron: '0 * * * *' # Runs automatically at the top of every hour
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save the new JSON file to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Feed Parser
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python city_feed_parser.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_city_feed.json processed_city_guids.txt
          git commit -m "Automated AI feed update" || exit 0
          git push
