    :root {
      --primary-color: #2563eb;
      --bg-color: #f1f5f9;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --banner-blue: #004360;
      --button-teal: #00A3BD;
    }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 0; /* Reset for banner flushness */
      top: 0 !important;
    }

    /* Banner Layout */
    .i-team-banner {
      background-color: var(--banner-blue);
      color: white;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .banner-logo {
      height: 45px;
      width: auto;
      flex-shrink: 0;
    }

    .banner-text {
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
      flex-grow: 1; /* Makes text span the whole middle section */
      padding: 0 15px;
    }

    .survey-button {
      background-color: var(--button-teal);
      color: white !important;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .survey-button:hover {
      opacity: 0.9;
    }

    /* Main content padding for consistency */
    .header, .feed-container, #status-msg {
      padding-left: 20px;
      padding-right: 20px;
    }
    
    .header {
      padding-top: 30px;
      max-width: 1200px;
      margin: 0 auto 30px auto;
      text-align: center;
    }

    /* Google Translate Hiding */
    .goog-te-banner-frame.skiptranslate,
    .goog-te-gadget span,
    .goog-logo-link {
      display: none !important;
    }

    .goog-te-gadget {
      color: transparent !important;
    }

    #google_translate_element {
      position: absolute;
      top: -9999px;
    }

    /* Language Toggle Switch */
    .language-controls {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 13px;
      color: #64748b;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cbd5e1;
      transition: .3s;
      border-radius: 22px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--primary-color);
    }

    input:checked+.slider:before {
      transform: translateX(22px);
    }

      gap: 10px;
      flex-wrap: wrap;

      margin: 0 auto 20px auto;
    }
